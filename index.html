<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PUCK.YOU | The World's First Thrifty AI Avatar</title>
    <meta name="description" content="Meet PUCK. A gritty, charismatic AI entity cobbled together from digital scraps. Part octopus, part punk-rock artifact, 100% unapologetic." />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }
        .logo {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -0.05em;
        }
        nav {
            display: flex;
            gap: 30px;
        }
        nav a {
            color: #888;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #a855f7;
        }
        .cta-button {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.2s;
        }
        .cta-button:hover {
            transform: scale(1.05);
        }
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            min-height: 80vh;
            padding: 40px 0;
        }
        .hero-content h2 {
            font-size: 0.9rem;
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
            border: 2px solid #a855f7;
            display: inline-block;
            padding: 8px 16px;
            border-radius: 5px;
        }
        .hero-content h1 {
            font-size: 5rem;
            line-height: 1.1;
            margin-bottom: 30px;
            font-weight: 900;
        }
        .hero-content h1 .highlight {
            color: #a855f7;
            font-style: italic;
        }
        .hero-content p {
            font-size: 1.2rem;
            color: #888;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .hero-image {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .hero-image img {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 0 50px rgba(168, 85, 247, 0.3));
        }
        @media (max-width: 768px) {
            .hero {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .hero-content h1 {
                font-size: 3rem;
            }
            nav {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">PUCK YOU</div>
            <nav>
                <a href="#intro">INTRO</a>
                <a href="#faces">FACES</a>
                <a href="#watch">WATCH</a>
                <a href="#roadmap">ROADMAP</a>
            </nav>
            <a href="#" class="cta-button">JOIN THE PLAN</a>
        </header>
        
        <section class="hero">
            <div class="hero-content">
                <h2>THE THRIFTY REVOLUTION</h2>
                <h1>PUCK <span class="highlight">IS</span> HERE.</h1>
                <p>Met PUCK. An AI avatar built from the scraps of the digital dumpster. Part octopus, part punk-rock artifact, 100% unapologetic. He's here to flip the script on AI with personality, grit, and zero pretense.</p>
            </div>
            <div class="hero-image">
                <img src="https://i.imgur.com/placeholder.png" alt="PUCK - The Thrifty AI Avatar" onerror="this.style.display='none'">
            </div>
        </section>
    </div>
</body>
</html>
