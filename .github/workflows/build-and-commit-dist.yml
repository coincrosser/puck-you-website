name: Build and Deploy to Porkbun

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build project
        run: npm run build
      
      - name: Deploy dist folder
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -f dist
          git commit -m "Deploy: Build and add dist folder" || echo "No changes to commit"
          git push
